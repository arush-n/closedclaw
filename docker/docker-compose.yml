# =============================================================================
# Closedclaw + Openclaw — All-in-One Docker Compose
# =============================================================================
#
# Architecture (everything in Docker):
#   closedclaw-server (:8765)  — governance server
#   openclaw MCP      (:8766 internal) — memory API
#   openclaw UI       (:3000)  — dashboard
#   Qdrant             (:6333)  — vector DB
#   control-bridge    (:9000 internal)  — policy bridge
#   ollama            (:11434) — local LLM for redaction/classification
#
# Usage:
#   cp .env.example .env   # edit with your API keys
#   docker compose up -d   # start everything
#   open http://localhost:3000  # openclaw UI
#   open http://localhost:8765/docs  # closedclaw API docs
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Ollama — Local LLM for redaction, classification, and privacy tasks
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: closedclaw-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - closedclaw-net
      - agent-net
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/11434'"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # GPU passthrough (uncomment for NVIDIA GPU support):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # Qdrant Vector Database — stores openclaw's memory embeddings
  # ---------------------------------------------------------------------------
  mem0-store:
    image: qdrant/qdrant:latest
    container_name: closedclaw-qdrant
    volumes:
      - mem0_storage:/qdrant/storage
    networks:
      - closedclaw-net
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Closedclaw Server — privacy governance, memory firewall, audit
  # ---------------------------------------------------------------------------
  closedclaw-server:
    build:
      context: ../closedclaw-master/
      dockerfile: ../docker/closedclaw-server/Dockerfile
    image: closedclaw/server:latest
    container_name: closedclaw-server
    environment:
      - CLOSEDCLAW_HOST=0.0.0.0
      - CLOSEDCLAW_PORT=8765
      - CLOSEDCLAW_LOG_LEVEL=${CLOSEDCLAW_LOG_LEVEL:-INFO}
      - CLOSEDCLAW_FAST_STARTUP=true
      # Ollama inside Docker
      - CLOSEDCLAW_OLLAMA_BASE_URL=http://ollama:11434
      - CLOSEDCLAW_LOCAL_ENGINE_ENABLED=true
      - CLOSEDCLAW_LOCAL_ENGINE_LLM_MODEL=${OLLAMA_MODEL:-qwen3:4b}
      - CLOSEDCLAW_LOCAL_FAST_MODEL=${OLLAMA_FAST_MODEL:-qwen3:1.7b}
      # Provider config — use ollama for local-only operation
      - CLOSEDCLAW_PROVIDER=${CLOSEDCLAW_PROVIDER:-ollama}
      - CLOSEDCLAW_DEFAULT_MODEL=${CLOSEDCLAW_DEFAULT_MODEL:-}
      - CLOSEDCLAW_OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLOSEDCLAW_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLOSEDCLAW_GROQ_API_KEY=${GROQ_API_KEY:-}
      - CLOSEDCLAW_TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
    volumes:
      - ./config:/config:ro
      - closedclaw_data:/data
      - closedclaw_auth:/root/.closedclaw
    networks:
      - closedclaw-net
    ports:
      - "${CLOSEDCLAW_PORT:-8765}:8765"
    depends_on:
      ollama:
        condition: service_healthy
      mem0-store:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/health', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Openclaw MCP Server (OpenMemory API)
  # On agent-net only — cannot reach closedclaw dashboard or shutdown endpoint
  # ---------------------------------------------------------------------------
  openmemory-mcp:
    image: mem0/openmemory-mcp
    container_name: closedclaw-openclaw-mcp
    environment:
      - USER=${USER_ID:-default-user}
      # Provider API keys — all passed through, system auto-selects
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      # LLM and embedding config — defaults to Ollama (local)
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-qwen3:4b}
      - LLM_OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDER_PROVIDER=${EMBEDDER_PROVIDER:-ollama}
      - EMBEDDER_MODEL=${EMBEDDER_MODEL:-nomic-embed-text}
      - EMBEDDER_OLLAMA_BASE_URL=http://ollama:11434
      # Route through control bridge for restricted services
      - CLOSEDCLAW_BRIDGE_URL=http://control-bridge:9000
      - CLOSEDCLAW_BRIDGE_ENABLED=true
    env_file:
      - .env
    depends_on:
      mem0-store:
        condition: service_healthy
      control-bridge:
        condition: service_started
    volumes:
      - ./config/openclaw.yaml:/usr/src/openmemory/closedclaw_config.yaml:ro
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/docs', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "${OPENMEMORY_MCP_PORT:-8766}:8765"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Openclaw Dashboard (OpenMemory UI)
  # On agent-net only — can reach MCP but not closedclaw-server directly
  # ---------------------------------------------------------------------------
  openmemory-ui:
    image: mem0/openmemory-ui:latest
    container_name: closedclaw-openclaw-ui
    ports:
      - "${OPENCLAW_UI_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${OPENCLAW_UI_PORT:-3000}/api
      - NEXT_PUBLIC_USER_ID=${USER_ID:-default-user}
      - API_URL=http://openmemory-mcp:8765
    depends_on:
      openmemory-mcp:
        condition: service_started
    networks:
      - agent-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Closedclaw Control Bridge
  # On agent-net only — agents access closedclaw-server via bridge, not directly.
  # The bridge has a restricted API surface — no shutdown or password endpoints.
  # ---------------------------------------------------------------------------
  control-bridge:
    build:
      context: ./bridge/
      dockerfile: Dockerfile
    image: closedclaw/control-bridge:latest
    container_name: closedclaw-bridge
    environment:
      - BRIDGE_LOG_LEVEL=${BRIDGE_LOG_LEVEL:-INFO}
      # Bridge connects to closedclaw-server via the shared closedclaw-net
      - CLOSEDCLAW_HOST_URL=http://closedclaw-server:8765
      - OPENCLAW_INTERNAL_URL=http://openmemory-mcp:8765
      - BRIDGE_CONFIG_PATH=/config/closedclaw.yaml
      - OPENCLAW_CONFIG_PATH=/config/openclaw.yaml
      # Provider awareness — bridge tracks which provider is in use
      - CLOSEDCLAW_PROVIDER=${CLOSEDCLAW_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://ollama:11434
      # MCP service credentials
      - GOOGLE_OAUTH_TOKEN=${GOOGLE_OAUTH_TOKEN:-}
      - NOTION_API_KEY=${NOTION_API_KEY:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - ./config:/config:ro
      - bridge_data:/data
    networks:
      - closedclaw-net
      - agent-net
    depends_on:
      closedclaw-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Closedclaw Dashboard — memory graph, audit, consent, policies UI
  # ---------------------------------------------------------------------------
  closedclaw-dashboard:
    build:
      context: ../closedclaw-master/src/closedclaw/ui/
      dockerfile: ../../../../docker/closedclaw-dashboard/Dockerfile
    image: closedclaw/dashboard:latest
    container_name: closedclaw-dashboard
    environment:
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - CLOSEDCLAW_API_URL=http://closedclaw-server:8765
      - MEM0_API_URL=http://closedclaw-server:8765
      - NEXT_PUBLIC_API_URL=http://localhost:${CLOSEDCLAW_DASHBOARD_PORT:-3001}/closedclaw-api
      - OPENMEMORY_API_URL=http://openmemory-mcp:8765
    volumes:
      - closedclaw_auth:/root/.closedclaw:ro
    ports:
      - "${CLOSEDCLAW_DASHBOARD_PORT:-3001}:3001"
    depends_on:
      closedclaw-server:
        condition: service_healthy
    networks:
      - closedclaw-net
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3001',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  closedclaw-net:
    driver: bridge
    name: closedclaw-network
  agent-net:
    driver: bridge
    name: closedclaw-agent-network

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  mem0_storage:
    name: closedclaw-qdrant-storage
  bridge_data:
    name: closedclaw-bridge-data
  closedclaw_data:
    name: closedclaw-server-data
  ollama_data:
    name: closedclaw-ollama-data
  closedclaw_auth:
    name: closedclaw-auth-data
