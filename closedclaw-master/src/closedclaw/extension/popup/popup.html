<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Openclaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      font-size: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid #e5e5e5;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #2563eb; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    .status {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
    }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }

    .section {
      padding: 12px 16px;
      border-top: 1px solid #e5e5e5;
    }
    .section h2 {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .memory-search {
      display: flex;
      gap: 8px;
    }
    .memory-search input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }
    .memory-search input:focus { border-color: #2563eb; }
    .memory-search button {
      padding: 8px 14px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .results {
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .result-item {
      padding: 8px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 12px;
      color: #444;
      line-height: 1.4;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat .value {
      font-size: 20px;
      font-weight: 600;
      color: #2563eb;
    }
    .stat .label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #e5e5e5;
      text-align: center;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Openclaw</h1>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="statusBar">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
  </div>

  <div class="section">
    <h2>Memory Search</h2>
    <div class="memory-search">
      <input type="text" id="searchInput" placeholder="Search your memories..." />
      <button id="searchBtn">Search</button>
    </div>
    <div class="results" id="searchResults"></div>
  </div>

  <div class="section">
    <h2>Session</h2>
    <div class="stats" id="statsGrid">
      <div class="stat">
        <div class="value" id="rulesCount">-</div>
        <div class="label">Active Rules</div>
      </div>
      <div class="stat">
        <div class="value" id="agentsCount">-</div>
        <div class="label">Agents</div>
      </div>
    </div>
  </div>

  <div class="footer">
    Openclaw v0.1.0 &middot; Privacy-first AI memory
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
